<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Macro Tuner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #111;
  color: #eee;
  padding: 1rem;
}
.app { max-width: 600px; margin: 0 auto; }
.title {
  font-size: 11px;
  color: #555;
  margin-bottom: 1rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.tuners {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.tuner {
  border-radius: 14px;
  padding: 14px 12px 10px;
}
.tuner-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.tuner-label { font-size: 13px; font-weight: 500; }
.tuner-hz { font-size: 11px; opacity: 0.7; }
.note-display {
  font-size: 48px;
  font-weight: 500;
  text-align: center;
  line-height: 1;
  min-height: 48px;
  transition: color 0.2s;
}
.freq-display {
  font-size: 12px;
  opacity: 0.7;
  text-align: center;
  margin-top: 3px;
  min-height: 16px;
}
.canvas-wrap { margin: 8px 0 0; }
canvas { display: block; width: 100%; }
.cents-display {
  font-size: 12px;
  opacity: 0.7;
  text-align: center;
  min-height: 16px;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.tuner-red    { background: #4a1008; color: #ffb3a7; border: 1px solid #8b2010; }
.tuner-yellow { background: #3d2e00; color: #ffe88a; border: 1px solid #7a5a00; }
.tuner-green  { background: #0a2e12; color: #9eedb4; border: 1px solid #1a6630; }
.tuner-blue   { background: #071e40; color: #8ec8ff; border: 1px solid #1040a0; }
.start-btn {
  display: block;
  width: 100%;
  margin-top: 1rem;
  padding: 14px;
  border-radius: 10px;
  border: 0.5px solid #333;
  background: #1a1a1a;
  color: #eee;
  font-size: 15px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.start-btn:active { background: #222; }
.status {
  font-size: 12px;
  color: #555;
  text-align: center;
  margin-top: 8px;
  min-height: 16px;
}
@media (max-width: 380px) {
  .tuner { padding: 10px 8px 8px; }
  .note-display { font-size: 38px; min-height: 38px; }
  .tuner-label { font-size: 11px; }
}
</style>
</head>
<body>
<div class="app">
  <p class="title">Macro tuner</p>
  <div class="tuners" id="tuners"></div>
  <button class="start-btn" id="startBtn">Allow microphone access to start</button>
  <p class="status" id="status">Tap the button to begin</p>
</div>

<script>
const SYSTEMS = [
  { label: 'Standard',  hz: 440, color: '#ff6b55', cls: 'tuner-red',    track: '#6b1a0a' },
  { label: '25c sharp', hz: 446, color: '#ffd84a', cls: 'tuner-yellow', track: '#6b4e00' },
  { label: '50c flat',  hz: 427, color: '#4ed87a', cls: 'tuner-green',  track: '#0f4a1e' },
  { label: '25c flat',  hz: 434, color: '#5ab4ff', cls: 'tuner-blue',   track: '#0a2e6b' },
]
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

const tunerEl = document.getElementById('tuners')
const canvases = []

SYSTEMS.forEach((sys, i) => {
  const div = document.createElement('div')
  div.className = `tuner ${sys.cls}`
  div.innerHTML = `
    <div class="tuner-header">
      <span class="tuner-label">${sys.label}</span>
      <span class="tuner-hz">A=${sys.hz}Hz</span>
    </div>
    <div class="note-display" id="note${i}">—</div>
    <div class="freq-display" id="freq${i}"></div>
    <div class="canvas-wrap"><canvas id="cv${i}" height="52"></canvas></div>
    <div class="cents-display" id="cents${i}"></div>
  `
  tunerEl.appendChild(div)
})

SYSTEMS.forEach((sys, i) => {
  const cv = document.getElementById(`cv${i}`)
  canvases.push(cv)
  drawMeter(cv, sys.color, sys.track, 0, false)
})

function drawMeter(cv, color, trackCol, cents, active) {
  const W = cv.offsetWidth || 180
  cv.width = W * 2
  cv.height = 110
  const ctx = cv.getContext('2d')
  ctx.scale(2, 2)
  const w = W, h = 55
  ctx.clearRect(0, 0, w, h)
  const tickCol = color + '55'
  const centerCol = color + '88'
  const cx = w / 2, cy = h + 8, r = h + 4

  // Track
  ctx.beginPath()
  ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI)
  ctx.strokeStyle = trackCol
  ctx.lineWidth = 16
  ctx.lineCap = 'butt'
  ctx.stroke()

  // Ticks
  for (let c = -50; c <= 50; c += 10) {
    const angle = Math.PI + (c / 100) * Math.PI
    const isMain = c % 50 === 0
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(angle) * (r + 9), cy + Math.sin(angle) * (r + 9))
    ctx.lineTo(cx + Math.cos(angle) * (r + 2), cy + Math.sin(angle) * (r + 2))
    ctx.strokeStyle = tickCol
    ctx.lineWidth = isMain ? 2 : 1
    ctx.stroke()
  }

  if (active) {
    const cl = Math.max(-50, Math.min(50, cents))
    const abs = Math.abs(cl)
    const inTune = abs < 5
    const close = abs < 20
    const nc = inTune ? '#44ff88' : close ? '#ffcc00' : '#ff4444'
    const endAngle = Math.PI + (cl / 100) * Math.PI

    // Arc fill
    ctx.beginPath()
    ctx.arc(cx, cy, r, Math.min(Math.PI, endAngle), Math.max(Math.PI, endAngle))
    ctx.strokeStyle = nc
    ctx.lineWidth = 16
    ctx.globalAlpha = inTune ? 0.6 : 0.35
    ctx.stroke()
    ctx.globalAlpha = 1

    // Needle
    const angle = endAngle
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(angle + Math.PI/2) * 3, cy + Math.sin(angle + Math.PI/2) * 3)
    ctx.lineTo(cx + Math.cos(angle) * (r + 6), cy + Math.sin(angle) * (r + 6))
    ctx.lineTo(cx + Math.cos(angle - Math.PI/2) * 3, cy + Math.sin(angle - Math.PI/2) * 3)
    ctx.closePath()
    ctx.fillStyle = nc
    ctx.fill()

    // Centre dot
    ctx.beginPath()
    ctx.arc(cx, cy, inTune ? 7 : 5, 0, 2 * Math.PI)
    ctx.fillStyle = nc
    ctx.fill()

    // In-tune glow ring
    if (inTune) {
      ctx.beginPath()
      ctx.arc(cx, cy, 11, 0, 2 * Math.PI)
      ctx.strokeStyle = nc
      ctx.lineWidth = 1.5
      ctx.globalAlpha = 0.4
      ctx.stroke()
      ctx.globalAlpha = 1
    }
  }

  // Centre mark
  const ca = Math.PI
  ctx.beginPath()
  ctx.moveTo(cx + Math.cos(ca) * (r - 8), cy + Math.sin(ca) * (r - 8))
  ctx.lineTo(cx + Math.cos(ca) * (r + 10), cy + Math.sin(ca) * (r + 10))
  ctx.strokeStyle = centerCol
  ctx.lineWidth = 1.5
  ctx.stroke()
}

let audioCtx, analyser, running = false

// Much longer silence threshold — hold the last reading for a long time
const smooth = SYSTEMS.map(() => ({
  cents: 0, freq: 0, active: false, silence: 0, displayCents: 0
}))
const SILENCE_FRAMES = 60   // ~1 second before resetting
const FREQ_ALPHA = 0.06     // very smooth frequency
const CENTS_ALPHA = 0.08    // very smooth cents

function freqToMidi(freq, a4) { return 69 + 12 * Math.log2(freq / a4) }

function getNoteInfo(freq, a4) {
  if (!freq || freq < 20) return null
  const midi = freqToMidi(freq, a4)
  const rounded = Math.round(midi)
  const cents = (midi - rounded) * 100
  const octave = Math.floor(rounded / 12) - 1
  const note = NOTE_NAMES[((rounded % 12) + 12) % 12]
  return { note, octave, cents }
}

document.getElementById('startBtn').addEventListener('click', async () => {
  if (running) return
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    analyser = audioCtx.createAnalyser()
    analyser.fftSize = 8192
    analyser.smoothingTimeConstant = 0.94
    audioCtx.createMediaStreamSource(stream).connect(analyser)
    running = true
    document.getElementById('startBtn').style.display = 'none'
    document.getElementById('status').textContent = 'Listening...'
    detect()
  } catch(e) {
    document.getElementById('status').textContent = 'Microphone access denied'
  }
})

function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length
  let rms = 0
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i]
  if (Math.sqrt(rms / SIZE) < 0.015) return -1
  let r1 = 0, r2 = SIZE - 1
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break } }
  const t = buf.slice(r1, r2), len = t.length
  const c = new Array(len).fill(0)
  for (let i = 0; i < len; i++) for (let j = 0; j < len - i; j++) c[i] += t[j] * t[j + i]
  let d = 0
  while (c[d] > c[d + 1]) d++
  let maxVal = -1, maxPos = -1
  for (let i = d; i < len; i++) if (c[i] > maxVal) { maxVal = c[i]; maxPos = i }
  let T0 = maxPos
  const a2 = (c[T0-1] + c[T0+1] - 2*c[T0]) / 2
  const b2 = (c[T0+1] - c[T0-1]) / 2
  if (a2) T0 = T0 - b2 / (2 * a2)
  return sampleRate / T0
}

function detect() {
  if (!running) return
  const buf = new Float32Array(analyser.fftSize)
  analyser.getFloatTimeDomainData(buf)
  const rawFreq = autoCorrelate(buf, audioCtx.sampleRate)

  SYSTEMS.forEach((sys, i) => {
    const s = smooth[i]

    if (rawFreq > 0) {
      s.silence = 0
      s.freq = s.active ? s.freq + FREQ_ALPHA * (rawFreq - s.freq) : rawFreq
      s.active = true

      const info = getNoteInfo(s.freq, sys.hz)
      if (info) {
        s.displayCents = s.displayCents + CENTS_ALPHA * (info.cents - s.displayCents)
        const sc = Math.round(s.displayCents)
        const abs = Math.abs(sc)
        const inTune = abs < 5

        const noteEl = document.getElementById(`note${i}`)
        noteEl.textContent = info.note + info.octave
        noteEl.style.color = inTune ? '#44ff88' : ''

        document.getElementById(`freq${i}`).textContent = Math.round(s.freq) + ' Hz'
        document.getElementById(`cents${i}`).textContent = inTune ? '✓ in tune' : (sc >= 0 ? '+' : '') + sc + ' cents'
        drawMeter(canvases[i], sys.color, sys.track, s.displayCents, true)
      }
    } else {
      s.silence++
      // Hold the display for SILENCE_FRAMES before clearing
      if (s.silence > SILENCE_FRAMES && s.active) {
        s.active = false
        s.displayCents = 0
        s.freq = 0
        document.getElementById(`note${i}`).textContent = '—'
        document.getElementById(`note${i}`).style.color = ''
        document.getElementById(`freq${i}`).textContent = ''
        document.getElementById(`cents${i}`).textContent = ''
        drawMeter(canvases[i], sys.color, sys.track, 0, false)
      }
    }
  })

  requestAnimationFrame(detect)
}
</script>
</body>
</html>
