<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Macro Tuner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #111;
  color: #eee;
  padding: 1rem;
}
.app { max-width: 600px; margin: 0 auto; }
.title { font-size: 11px; color: #555; margin-bottom: 1rem; letter-spacing: 0.1em; text-transform: uppercase; }
.tuners { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.tuner { border-radius: 14px; padding: 14px 12px 10px; }
.tuner-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.tuner-label { font-size: 13px; font-weight: 500; }
.tuner-hz { font-size: 11px; opacity: 0.7; }
.note-display { font-size: 48px; font-weight: 500; text-align: center; line-height: 1; min-height: 48px; }
.freq-display { font-size: 12px; opacity: 0.7; text-align: center; margin-top: 3px; min-height: 16px; }
.canvas-wrap { margin: 8px 0 0; }
canvas { display: block; width: 100%; }
.cents-display { font-size: 12px; opacity: 0.8; text-align: center; min-height: 16px; margin-top: 4px; font-variant-numeric: tabular-nums; font-weight: 500; }
.tuner-red    { background: #4a1008; color: #ffb3a7; border: 1px solid #8b2010; }
.tuner-yellow { background: #3d2e00; color: #ffe88a; border: 1px solid #7a5a00; }
.tuner-green  { background: #0a2e12; color: #9eedb4; border: 1px solid #1a6630; }
.tuner-blue   { background: #071e40; color: #8ec8ff; border: 1px solid #1040a0; }
.start-btn { display: block; width: 100%; margin-top: 1rem; padding: 14px; border-radius: 10px; border: 0.5px solid #333; background: #1a1a1a; color: #eee; font-size: 15px; cursor: pointer; }
.status { font-size: 12px; color: #555; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <p class="title">Macro tuner</p>
  <div class="tuners" id="tuners"></div>
  <button class="start-btn" id="startBtn">Allow microphone access to start</button>
  <p class="status" id="status">Tap the button to begin</p>
</div>
<script>
const SYSTEMS = [
  { label: 'Standard',  hz: 440, color: '#ff6b55', cls: 'tuner-red',    track: '#6b1a0a' },
  { label: '25c sharp', hz: 446, color: '#ffd84a', cls: 'tuner-yellow', track: '#6b4e00' },
  { label: '50c flat',  hz: 427, color: '#4ed87a', cls: 'tuner-green',  track: '#0f4a1e' },
  { label: '25c flat',  hz: 434, color: '#5ab4ff', cls: 'tuner-blue',   track: '#0a2e6b' },
]
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

// Build UI
const tunerEl = document.getElementById('tuners')
const canvases = []
SYSTEMS.forEach((sys, i) => {
  const div = document.createElement('div')
  div.className = `tuner ${sys.cls}`
  div.innerHTML = `
    <div class="tuner-header">
      <span class="tuner-label">${sys.label}</span>
      <span class="tuner-hz">A=${sys.hz}Hz</span>
    </div>
    <div class="note-display" id="note${i}">—</div>
    <div class="freq-display" id="freq${i}"></div>
    <div class="canvas-wrap"><canvas id="cv${i}" height="52"></canvas></div>
    <div class="cents-display" id="cents${i}"></div>`
  tunerEl.appendChild(div)
  const cv = document.getElementById(`cv${i}`)
  canvases.push(cv)
  drawMeter(cv, sys.color, sys.track, 0, false)
})

function drawMeter(cv, color, trackCol, cents, active) {
  const W = cv.offsetWidth || 180
  cv.width = W * 2; cv.height = 110
  const ctx = cv.getContext('2d')
  ctx.scale(2, 2)
  const w = W, h = 55
  ctx.clearRect(0, 0, w, h)
  const cx = w / 2, cy = h + 8, r = h + 4

  ctx.beginPath()
  ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI)
  ctx.strokeStyle = trackCol
  ctx.lineWidth = 16
  ctx.lineCap = 'butt'
  ctx.stroke()

  for (let c = -50; c <= 50; c += 10) {
    const angle = Math.PI + (c / 100) * Math.PI
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(angle) * (r + 9), cy + Math.sin(angle) * (r + 9))
    ctx.lineTo(cx + Math.cos(angle) * (r + 2), cy + Math.sin(angle) * (r + 2))
    ctx.strokeStyle = color + '44'
    ctx.lineWidth = c % 50 === 0 ? 2 : 1
    ctx.stroke()
  }

  if (active) {
    const cl = Math.max(-50, Math.min(50, cents))
    const abs = Math.abs(cl)
    const nc = abs < 5 ? '#44ff88' : abs < 20 ? '#ffcc00' : '#ff4444'
    const endAngle = Math.PI + (cl / 100) * Math.PI

    ctx.beginPath()
    ctx.arc(cx, cy, r, Math.min(Math.PI, endAngle), Math.max(Math.PI, endAngle))
    ctx.strokeStyle = nc
    ctx.lineWidth = 16
    ctx.globalAlpha = abs < 5 ? 0.7 : 0.4
    ctx.stroke()
    ctx.globalAlpha = 1

    const angle = endAngle
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(angle + Math.PI/2) * 3, cy + Math.sin(angle + Math.PI/2) * 3)
    ctx.lineTo(cx + Math.cos(angle) * (r + 6), cy + Math.sin(angle) * (r + 6))
    ctx.lineTo(cx + Math.cos(angle - Math.PI/2) * 3, cy + Math.sin(angle - Math.PI/2) * 3)
    ctx.closePath()
    ctx.fillStyle = nc
    ctx.fill()

    ctx.beginPath()
    ctx.arc(cx, cy, 5, 0, 2 * Math.PI)
    ctx.fillStyle = nc
    ctx.fill()
  }

  // Centre mark
  ctx.beginPath()
  ctx.moveTo(cx + Math.cos(Math.PI) * (r - 8), cy + Math.sin(Math.PI) * (r - 8))
  ctx.lineTo(cx + Math.cos(Math.PI) * (r + 10), cy + Math.sin(Math.PI) * (r + 10))
  ctx.strokeStyle = color + '77'
  ctx.lineWidth = 1.5
  ctx.stroke()
}

// State
let audioCtx, analyser, running = false
let smoothFreq = 0
let smoothActive = false
let silenceCount = 0
const SILENCE_HOLD = 45  // frames to hold after note stops

// Per-tuner display smoothing
const display = SYSTEMS.map(() => ({ cents: 0 }))

function freqToMidi(freq, a4) { return 69 + 12 * Math.log2(freq / a4) }

function getNoteInfo(freq, a4) {
  const midi = freqToMidi(freq, a4)
  const rounded = Math.round(midi)
  const cents = (midi - rounded) * 100
  const octave = Math.floor(rounded / 12) - 1
  const note = NOTE_NAMES[((rounded % 12) + 12) % 12]
  return { note, octave, cents }
}

// HPS pitch detection — more accurate than autocorrelation
function detectPitch(analyser, sampleRate) {
  const bufLen = analyser.frequencyBinCount
  const freqData = new Float32Array(bufLen)
  analyser.getFloatFrequencyData(freqData)

  // Check signal level
  const maxDB = Math.max(...freqData.slice(0, bufLen / 2))
  if (maxDB < -50) return -1

  // Convert dB to magnitude
  const mag = freqData.map(v => Math.pow(10, v / 20))

  // Harmonic Product Spectrum — multiply downsampled copies
  const hps = mag.slice()
  const harmonics = 4
  for (let h = 2; h <= harmonics; h++) {
    for (let i = 0; i < hps.length; i++) {
      hps[i] *= (mag[Math.floor(i * h)] || 0)
    }
  }

  // Find peak in human pitch range (60Hz - 1200Hz)
  const minBin = Math.floor(60 * bufLen / sampleRate * 2)
  const maxBin = Math.floor(1200 * bufLen / sampleRate * 2)
  let maxVal = 0, maxBinIdx = minBin
  for (let i = minBin; i < maxBin; i++) {
    if (hps[i] > maxVal) { maxVal = hps[i]; maxBinIdx = i }
  }

  // Interpolate for sub-bin accuracy
  if (maxBinIdx > 0 && maxBinIdx < hps.length - 1) {
    const y1 = hps[maxBinIdx - 1], y2 = hps[maxBinIdx], y3 = hps[maxBinIdx + 1]
    const offset = (y3 - y1) / (2 * (2 * y2 - y1 - y3))
    return (maxBinIdx + offset) * sampleRate / (bufLen * 2)
  }
  return maxBinIdx * sampleRate / (bufLen * 2)
}

document.getElementById('startBtn').addEventListener('click', async () => {
  if (running) return
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    analyser = audioCtx.createAnalyser()
    analyser.fftSize = 16384
    analyser.smoothingTimeConstant = 0.85
    audioCtx.createMediaStreamSource(stream).connect(analyser)
    running = true
    document.getElementById('startBtn').style.display = 'none'
    document.getElementById('status').textContent = 'Listening...'
    detect()
  } catch(e) {
    document.getElementById('status').textContent = 'Microphone access denied'
  }
})

function updateDisplays(freq) {
  SYSTEMS.forEach((sys, i) => {
    const info = getNoteInfo(freq, sys.hz)
    // Smooth cents display
    display[i].cents += 0.1 * (info.cents - display[i].cents)
    const sc = Math.round(display[i].cents)
    const abs = Math.abs(sc)
    const inTune = abs < 5

    document.getElementById(`note${i}`).textContent = info.note + info.octave
    document.getElementById(`freq${i}`).textContent = Math.round(freq) + ' Hz'
    document.getElementById(`cents${i}`).textContent = inTune ? '✓ in tune' : (sc >= 0 ? '+' : '') + sc + ' cents'
    drawMeter(canvases[i], sys.color, sys.track, display[i].cents, true)
  })
}

function clearDisplays() {
  SYSTEMS.forEach((sys, i) => {
    document.getElementById(`note${i}`).textContent = '—'
    document.getElementById(`freq${i}`).textContent = ''
    document.getElementById(`cents${i}`).textContent = ''
    drawMeter(canvases[i], sys.color, sys.track, 0, false)
  })
}

function detect() {
  if (!running) return
  const rawFreq = detectPitch(analyser, audioCtx.sampleRate)

  if (rawFreq > 0) {
    silenceCount = 0
    // Smooth frequency — only update if close to current (avoids octave jumps)
    if (!smoothActive) {
      smoothFreq = rawFreq
      smoothActive = true
    } else {
      const ratio = rawFreq / smoothFreq
      // Only pull toward new freq if it's within an octave of current
      if (ratio > 0.5 && ratio < 2.0) {
        smoothFreq += 0.07 * (rawFreq - smoothFreq)
      }
    }
    updateDisplays(smoothFreq)
  } else {
    silenceCount++
    if (silenceCount > SILENCE_HOLD) {
      smoothActive = false
      clearDisplays()
    }
    // Otherwise hold last display
  }

  requestAnimationFrame(detect)
}
</script>
</body>
</html>
