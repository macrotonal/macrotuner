
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { padding: 1rem; }
.title { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 1rem; letter-spacing: 0.08em; text-transform: uppercase; }
.tuners { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.tuner { border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 14px 12px 10px; background: var(--color-background-primary); }
.tuner-header { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.tuner-label { font-size: 11px; color: var(--color-text-secondary); }
.tuner-hz { font-size: 10px; color: var(--color-text-secondary); margin-left: auto; opacity: 0.7; }
.note-display { font-size: 44px; font-weight: 500; color: var(--color-text-primary); text-align: center; line-height: 1; min-height: 44px; }
.freq-display { font-size: 11px; color: var(--color-text-secondary); text-align: center; margin-top: 3px; min-height: 14px; }
.canvas-wrap { margin: 10px 0 0; }
canvas { display: block; width: 100%; }
.cents-display { font-size: 11px; color: var(--color-text-secondary); text-align: center; min-height: 14px; margin-top: 2px; }
.start-btn { display: block; width: 100%; margin-top: 1rem; padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; }
.start-btn:hover { background: var(--color-background-tertiary); }
.status { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; }
</style>

<div class="app">
  <p class="title">Macro tuner</p>
  <div class="tuners" id="tuners"></div>
  <button class="start-btn" id="startBtn">Allow microphone access to start</button>
  <p class="status" id="status">Tap the button to begin</p>
</div>

<script>
const SYSTEMS = [
  { label: 'Standard',  hz: 440, color: '#E8412A' },
  { label: '25c sharp', hz: 446, color: '#F5C500' },
  { label: '50c flat',  hz: 427, color: '#2EAA4A' },
  { label: '25c flat',  hz: 434, color: '#2B7FD4' },
]
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

const tunerEl = document.getElementById('tuners')
const canvases = []

SYSTEMS.forEach((sys, i) => {
  const div = document.createElement('div')
  div.className = 'tuner'
  div.innerHTML = `
    <div class="tuner-header">
      <div class="dot" style="background:${sys.color}"></div>
      <span class="tuner-label">${sys.label}</span>
      <span class="tuner-hz">A=${sys.hz}Hz</span>
    </div>
    <div class="note-display" id="note${i}">—</div>
    <div class="freq-display" id="freq${i}"></div>
    <div class="canvas-wrap"><canvas id="cv${i}" height="52"></canvas></div>
    <div class="cents-display" id="cents${i}"></div>
  `
  tunerEl.appendChild(div)
})

SYSTEMS.forEach((sys, i) => {
  const cv = document.getElementById(`cv${i}`)
  canvases.push(cv)
  drawMeter(cv, sys.color, 0, false)
})

function drawMeter(cv, color, cents, active) {
  const W = cv.offsetWidth || 200
  cv.width = W * 2
  cv.height = 104
  const ctx = cv.getContext('2d')
  ctx.scale(2, 2)
  const w = W, h = 52

  ctx.clearRect(0, 0, w, h)

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches
  const trackCol = isDark ? '#2a2a2a' : '#f0f0f0'
  const tickCol = isDark ? '#444' : '#ccc'
  const centerCol = isDark ? '#666' : '#aaa'

  const cx = w / 2
  const cy = h + 10
  const r = h + 2

  // Arc track
  ctx.beginPath()
  ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI)
  ctx.strokeStyle = trackCol
  ctx.lineWidth = 14
  ctx.lineCap = 'butt'
  ctx.stroke()

  // Tick marks
  for (let c = -50; c <= 50; c += 10) {
    const angle = Math.PI + (c / 100) * Math.PI
    const inner = c % 50 === 0 ? r - 12 : c % 20 === 0 ? r - 8 : r - 5
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(angle) * (r + 7), cy + Math.sin(angle) * (r + 7))
    ctx.lineTo(cx + Math.cos(angle) * (r + 2), cy + Math.sin(angle) * (r + 2))
    ctx.strokeStyle = tickCol
    ctx.lineWidth = c % 50 === 0 ? 2 : 1
    ctx.stroke()
  }

  if (active) {
    const clampedCents = Math.max(-50, Math.min(50, cents))
    const abs = Math.abs(clampedCents)
    const needleColor = abs < 5 ? color : abs < 20 ? '#F5C500' : '#E24B4A'

    // Coloured arc fill
    const startAngle = Math.PI
    const endAngle = Math.PI + (clampedCents / 100) * Math.PI
    ctx.beginPath()
    ctx.arc(cx, cy, r, Math.min(startAngle, endAngle), Math.max(startAngle, endAngle))
    ctx.strokeStyle = needleColor
    ctx.lineWidth = 14
    ctx.lineCap = 'butt'
    ctx.globalAlpha = 0.35
    ctx.stroke()
    ctx.globalAlpha = 1

    // Needle
    const angle = Math.PI + (clampedCents / 100) * Math.PI
    const nx = cx + Math.cos(angle) * (r + 4)
    const ny = cy + Math.sin(angle) * (r + 4)
    ctx.beginPath()
    ctx.moveTo(cx, cy)
    ctx.lineTo(nx, ny)
    ctx.strokeStyle = needleColor
    ctx.lineWidth = 2.5
    ctx.lineCap = 'round'
    ctx.stroke()

    // Centre dot
    ctx.beginPath()
    ctx.arc(cx, cy, 5, 0, 2 * Math.PI)
    ctx.fillStyle = needleColor
    ctx.fill()
  }

  // Centre line
  const cAngle = Math.PI
  ctx.beginPath()
  ctx.moveTo(cx + Math.cos(cAngle) * (r - 7), cy + Math.sin(cAngle) * (r - 7))
  ctx.lineTo(cx + Math.cos(cAngle) * (r + 8), cy + Math.sin(cAngle) * (r + 8))
  ctx.strokeStyle = centerCol
  ctx.lineWidth = 1.5
  ctx.stroke()
}

let audioCtx, analyser, running = false
const smooth = SYSTEMS.map(() => ({ cents: 0, freq: 0, active: false }))

function freqToMidi(freq, a4) { return 69 + 12 * Math.log2(freq / a4) }

function getNoteInfo(freq, a4) {
  if (!freq || freq < 20) return null
  const midi = freqToMidi(freq, a4)
  const rounded = Math.round(midi)
  const cents = (midi - rounded) * 100
  const octave = Math.floor(rounded / 12) - 1
  const note = NOTE_NAMES[((rounded % 12) + 12) % 12]
  return { note, octave, cents }
}

document.getElementById('startBtn').addEventListener('click', async () => {
  if (running) return
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    analyser = audioCtx.createAnalyser()
    analyser.fftSize = 8192
    analyser.smoothingTimeConstant = 0.92
    audioCtx.createMediaStreamSource(stream).connect(analyser)
    running = true
    document.getElementById('startBtn').style.display = 'none'
    document.getElementById('status').textContent = 'Listening...'
    detect()
  } catch(e) {
    document.getElementById('status').textContent = 'Microphone access denied'
  }
})

function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length
  let rms = 0
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i]
  if (Math.sqrt(rms / SIZE) < 0.015) return -1
  let r1 = 0, r2 = SIZE - 1
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < 0.2) { r2 = SIZE - i; break } }
  const t = buf.slice(r1, r2), len = t.length
  const c = new Array(len).fill(0)
  for (let i = 0; i < len; i++) for (let j = 0; j < len - i; j++) c[i] += t[j] * t[j + i]
  let d = 0
  while (c[d] > c[d + 1]) d++
  let maxVal = -1, maxPos = -1
  for (let i = d; i < len; i++) if (c[i] > maxVal) { maxVal = c[i]; maxPos = i }
  let T0 = maxPos
  const a = (c[T0-1] + c[T0+1] - 2*c[T0]) / 2
  const b = (c[T0+1] - c[T0-1]) / 2
  if (a) T0 = T0 - b / (2 * a)
  return sampleRate / T0
}

const ALPHA = 0.1

function detect() {
  if (!running) return
  const buf = new Float32Array(analyser.fftSize)
  analyser.getFloatTimeDomainData(buf)
  const rawFreq = autoCorrelate(buf, audioCtx.sampleRate)

  SYSTEMS.forEach((sys, i) => {
    const s = smooth[i]
    if (rawFreq > 0) {
      s.freq = s.active ? s.freq + ALPHA * (rawFreq - s.freq) : rawFreq
      s.active = true
      const info = getNoteInfo(s.freq, sys.hz)
      if (info) {
        s.cents = s.cents + ALPHA * (info.cents - s.cents)
        const sc = Math.round(s.cents)
        document.getElementById(`note${i}`).textContent = info.note + info.octave
        document.getElementById(`freq${i}`).textContent = Math.round(s.freq) + ' Hz'
        document.getElementById(`cents${i}`).textContent = (sc >= 0 ? '+' : '') + sc + ' cents'
        drawMeter(canvases[i], sys.color, s.cents, true)
      }
    } else {
      if (s.active) {
        s.active = false; s.cents = 0; s.freq = 0
        document.getElementById(`note${i}`).textContent = '—'
        document.getElementById(`freq${i}`).textContent = ''
        document.getElementById(`cents${i}`).textContent = ''
        drawMeter(canvases[i], sys.color, 0, false)
      }
    }
  })

  requestAnimationFrame(detect)
}
</script>
