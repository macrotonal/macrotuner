
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { padding: 1rem; }
.title { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; letter-spacing: 0.05em; text-transform: uppercase; }
.tuners { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.tuner { border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1rem; background: var(--color-background-primary); }
.tuner-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tuner-label { font-size: 12px; color: var(--color-text-secondary); }
.tuner-hz { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; }
.note-display { font-size: 40px; font-weight: 500; color: var(--color-text-primary); text-align: center; min-height: 52px; line-height: 1.2; }
.note-sub { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 2px; min-height: 16px; }
.meter-wrap { margin: 12px 0 4px; position: relative; height: 20px; background: var(--color-background-secondary); border-radius: 10px; overflow: hidden; }
.meter-track { position: absolute; inset: 0; display: flex; align-items: center; }
.meter-fill { position: absolute; top: 0; bottom: 0; border-radius: 10px; transition: width 0.08s, left 0.08s, background 0.15s; }
.meter-center { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: var(--color-border-secondary); transform: translateX(-50%); z-index: 2; }
.cents { font-size: 12px; color: var(--color-text-secondary); text-align: center; min-height: 16px; margin-top: 4px; }
.start-btn { display: block; width: 100%; margin-top: 1rem; padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; }
.start-btn:hover { background: var(--color-background-tertiary); }
.status { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; min-height: 16px; }
</style>

<div class="app">
  <p class="title">Macro tuner</p>
  <div class="tuners" id="tuners"></div>
  <button class="start-btn" id="startBtn">Allow microphone access to start</button>
  <p class="status" id="status">Tap the button to begin</p>
</div>

<script>
const SYSTEMS = [
  { label: 'Standard',  hz: 440, color: '#E8412A', name: 'red'    },
  { label: '25c sharp', hz: 446, color: '#F5C500', name: 'yellow' },
  { label: '50c flat',  hz: 427, color: '#2EAA4A', name: 'green'  },
  { label: '25c flat',  hz: 434, color: '#2B7FD4', name: 'blue'   },
]

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B']

const tunerEl = document.getElementById('tuners')
SYSTEMS.forEach((sys, i) => {
  tunerEl.innerHTML += `
    <div class="tuner">
      <div class="tuner-header">
        <div class="dot" style="background:${sys.color}"></div>
        <span class="tuner-label">${sys.label}</span>
        <span class="tuner-hz">A=${sys.hz}Hz</span>
      </div>
      <div class="note-display" id="note${i}">—</div>
      <div class="note-sub" id="sub${i}"></div>
      <div class="meter-wrap">
        <div class="meter-center"></div>
        <div class="meter-fill" id="bar${i}" style="background:${sys.color};left:50%;width:4px;"></div>
      </div>
      <div class="cents" id="cents${i}"></div>
    </div>`
})

let audioCtx, analyser, running = false

// Smoothing state per tuner
const smooth = SYSTEMS.map(() => ({ cents: 0, freq: 0, active: false }))

function freqToMidi(freq, a4) {
  return 69 + 12 * Math.log2(freq / a4)
}

function getNoteInfo(freq, a4) {
  if (!freq || freq < 20) return null
  const midi = freqToMidi(freq, a4)
  const rounded = Math.round(midi)
  const cents = (midi - rounded) * 100
  const octave = Math.floor(rounded / 12) - 1
  const note = NOTE_NAMES[((rounded % 12) + 12) % 12]
  return { note, octave, cents }
}

document.getElementById('startBtn').addEventListener('click', async () => {
  if (running) return
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    audioCtx = new (window.AudioContext || window.webkitAudioContext)()
    analyser = audioCtx.createAnalyser()
    analyser.fftSize = 8192
    analyser.smoothingTimeConstant = 0.9
    const source = audioCtx.createMediaStreamSource(stream)
    source.connect(analyser)
    running = true
    document.getElementById('startBtn').style.display = 'none'
    document.getElementById('status').textContent = 'Listening...'
    detect()
  } catch(e) {
    document.getElementById('status').textContent = 'Microphone access denied'
  }
})

function autoCorrelate(buf, sampleRate) {
  const SIZE = buf.length
  let rms = 0
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i]
  rms = Math.sqrt(rms / SIZE)
  if (rms < 0.015) return -1

  let r1 = 0, r2 = SIZE - 1
  const thres = 0.2
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < thres) { r1 = i; break } }
  for (let i = 1; i < SIZE / 2; i++) { if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break } }
  const trimmed = buf.slice(r1, r2)
  const len = trimmed.length
  const c = new Array(len).fill(0)
  for (let i = 0; i < len; i++)
    for (let j = 0; j < len - i; j++)
      c[i] += trimmed[j] * trimmed[j + i]
  let d = 0
  while (c[d] > c[d + 1]) d++
  let maxVal = -1, maxPos = -1
  for (let i = d; i < len; i++) {
    if (c[i] > maxVal) { maxVal = c[i]; maxPos = i }
  }
  let T0 = maxPos
  const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1]
  const a = (x1 + x3 - 2 * x2) / 2
  const b = (x3 - x1) / 2
  if (a) T0 = T0 - b / (2 * a)
  return sampleRate / T0
}

const ALPHA = 0.15  // smoothing factor — lower = smoother but slower

function detect() {
  if (!running) return
  const buf = new Float32Array(analyser.fftSize)
  analyser.getFloatTimeDomainData(buf)
  const rawFreq = autoCorrelate(buf, audioCtx.sampleRate)

  SYSTEMS.forEach((sys, i) => {
    const s = smooth[i]
    const noteEl = document.getElementById(`note${i}`)
    const subEl = document.getElementById(`sub${i}`)
    const barEl = document.getElementById(`bar${i}`)
    const centsEl = document.getElementById(`cents${i}`)

    if (rawFreq > 0) {
      // Smooth the frequency
      s.freq = s.active ? s.freq + ALPHA * (rawFreq - s.freq) : rawFreq
      s.active = true

      const info = getNoteInfo(s.freq, sys.hz)
      if (info) {
        // Smooth the cents
        s.cents = s.cents + ALPHA * (info.cents - s.cents)
        const sc = Math.round(s.cents)
        const abs = Math.abs(s.cents)

        noteEl.textContent = info.note + info.octave
        subEl.textContent = Math.round(s.freq) + ' Hz'

        // Meter: fill from centre, width = offset amount
        const offset = (s.cents / 50) * 45  // ±50 cents = ±45%
        const left = 50 + Math.min(Math.max(offset, -45), 45)
        const fromCentre = Math.abs(offset)
        const fillLeft = offset >= 0 ? 50 : left
        barEl.style.left = fillLeft + '%'
        barEl.style.width = Math.max(fromCentre, 2) + '%'
        barEl.style.background = abs < 5 ? sys.color : abs < 20 ? '#F5C500' : '#E24B4A'

        centsEl.textContent = (sc >= 0 ? '+' : '') + sc + ' cents'
      }
    } else {
      s.active = false
      s.cents = 0
      s.freq = 0
      noteEl.textContent = '—'
      subEl.textContent = ''
      barEl.style.left = '50%'
      barEl.style.width = '4px'
      barEl.style.background = '#888'
      centsEl.textContent = ''
    }
  })

  requestAnimationFrame(detect)
}
</script>
